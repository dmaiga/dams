<!DOCTYPE html>
<html lang="fr" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMS – Backoffice</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-50">

    <div class="drawer lg:drawer-open">
        <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />

        <!-- CONTENU PRINCIPAL -->
        <div class="drawer-content flex flex-col min-h-screen">
           
            <!-- CONTENU PAGE -->
            <main class="flex-1 p-4 lg:p-6">
                {% block content %}
                {% endblock %}
            </main>

            <!-- Pied de page -->
            <footer class="p-4 text-center text-sm text-gray-500 border-t">
                <p>DAM'S v0.0.1 • © 2025</p>
            </footer>
        </div>

        <!-- SIDEBAR -->
        <div class="drawer-side">
            <label for="drawer-toggle" class="drawer-overlay"></label>
            <aside class="bg-white min-h-full w-72 border-r shadow-sm">
                <!-- Logo -->
                <div class="p-5 border-b">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                            <i class="fas fa-warehouse text-white text-lg"></i>
                        </div>
                        <div>
                            <h1 class="font-bold text-lg text-gray-800">DAM'S</h1>
                            <p class="text-xs text-gray-500">Backoffice</p>
                        </div>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="p-4 space-y-1">
                        
                    <!-- Vue d'ensemble -->
                    <div class="mb-3">
                        <p class="text-xs font-semibold text-gray-500 px-3 mb-2">VUE D'ENSEMBLE</p>
                        <ul>
                            <li>
                                <a href="{% url 'dashboard' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-tachometer-alt w-5"></i>
                                    <span>Tableau de Bord</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Analyses -->
                    <div class="mb-3">
                        <p class="text-xs font-semibold text-gray-500 px-3 mb-2">ANALYSES</p>
                        <ul class="space-y-1">
                            <li>
                                <a href="{% url 'agent_dashboard' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if 'agent' in request.resolver_match.url_name %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-user-tie w-5"></i>
                                    <span>Agents</span>
                                </a>
                            </li>
<li>
    <a href="{% url 'liste_fournisseurs_direction' %}" 
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
              {% if request.resolver_match.url_name == 'liste_fournisseurs_direction' %}bg-blue-50 text-primary{% endif %}">
        <i class="fas fa-truck w-5"></i>
        <span>Fournisseurs</span>
    </a>
</li>
                            <li>
                                <a href="{% url 'product_list' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if 'product' in request.resolver_match.url_name %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-cube w-5"></i>
                                    <span>Produits</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Transactions -->
                    <div class="mb-3">
                        <p class="text-xs font-semibold text-gray-500 px-3 mb-2">TRANSACTIONS</p>
                        <ul class="space-y-1">
                            <li>
                                <a href="{% url 'toutes_les_ventes' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if 'vente' in request.resolver_match.url_name %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-shopping-cart w-5"></i>
                                    <span>Ventes</span>
                                </a>
                            </li>
<li>
    <a href="{% url 'factures_fournisseurs_direction' %}" 
       class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
              {% if request.resolver_match.url_name == 'factures_fournisseurs_direction' or request.resolver_match.url_name == 'detail_facture_fournisseur_direction' %}bg-blue-50 text-primary{% endif %}">
        <i class="fas fa-file-invoice-dollar w-5"></i>
        <span>Factures Fournisseurs</span>
    </a>
</li>
                            <li>
                                <a href="{% url 'versements_direction' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if 'versements' in request.resolver_match.url_name or 'versement' in request.resolver_match.url_name %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-money-check-alt w-5"></i>
                                    <span>Versements</span>
                                </a>
                            </li>
                            <li>
                                <a href="{% url 'analyse_financiere_direction' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-gray-100
                                          {% if 'analyse_financiere' in request.resolver_match.url_name %}bg-blue-50 text-primary{% endif %}">
                                    <i class="fas fa-chart-line w-5"></i>
                                    <span>Analyse Financière</span>
                                </a>
                            </li>
 
                            <li>
                                <a href="{% url 'liste_clotures' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors duration-200
                                          {% if 'liste_clotures' in request.resolver_match.url_name %}bg-blue-50 text-primary border-r-2 border-primary{% else %}hover:bg-gray-100 text-gray-700{% endif %}">
                                    <i class="fas fa-lock w-5 text-center"></i>
                                    <span>Clôtures</span>
                                </a>
                            </li>
                             <li>
                                <a href="{% url 'calcul_salaires' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors duration-200
                                          {% if 'calcul_salaires' in request.resolver_match.url_name %}bg-blue-50 text-primary border-r-2 border-primary{% else %}hover:bg-gray-100 text-gray-700{% endif %}">
                                    <i class="fas fa-lock w-5 text-center"></i>
                                    <span>Salaires</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Déconnexion -->
                    <div class="mt-8 pt-4 border-t">
                        <ul>
                            <li>
                                <a href="{% url 'logout' %}" 
                                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-50 text-gray-700">
                                    <i class="fas fa-sign-out-alt w-5"></i>
                                    <span>Déconnexion</span>
                                </a>
                            </li>
                        </ul>
                    </div>

                    
                </nav>
            </aside>
        </div>
    </div>

</body>
</html>

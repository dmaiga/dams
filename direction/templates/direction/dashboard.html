{% extends "direction/base_direction.html" %}

{% block content %}

<h1 class="text-3xl font-bold mb-6">Dashboard Direction</h1>

<!-- ======================== -->
<!-- 1) KPIs — chargement HTMX -->
<!-- ======================== -->

<div id="kpi-container"
     hx-get="{% url 'direction:kpis' %}"
     hx-trigger="load"
     hx-target="this"
     hx-swap="innerHTML">
    <div class="text-center py-8">
        <div class="loading loading-spinner loading-lg"></div>
        <p class="mt-2 text-sm">Chargement des indicateurs...</p>
    </div>
</div>

<!-- ========================= -->
<!-- 2) MENU TABS (DaisyUI)    -->
<!-- ========================= -->

<div role="tablist" class="tabs tabs-boxed my-6">
    <a role="tab" class="tab tab-active" 
       hx-get="{% url 'direction:stock' %}"
       hx-target="#content-area"
       hx-swap="innerHTML"
       _="on click remove .tab-active from .tab then add .tab-active to me">
       Stock
    </a>

    <a role="tab" class="tab"
       hx-get="{% url 'direction:ventes' %}"
       hx-target="#content-area"
       hx-swap="innerHTML"
       _="on click remove .tab-active from .tab then add .tab-active to me">
       Ventes
    </a>

    <a role="tab" class="tab"
       hx-get="{% url 'direction:agents' %}"
       hx-target="#content-area"
       hx-swap="innerHTML"
       _="on click remove .tab-active from .tab then add .tab-active to me">
       Agents
    </a>

    <a role="tab" class="tab"
       hx-get="{% url 'direction:depenses' %}"
       hx-target="#content-area"
       hx-swap="innerHTML"
       _="on click remove .tab-active from .tab then add .tab-active to me">
       Dépenses
    </a>
</div>

<!-- ============================ -->
<!-- 3) Zone centrale dynamique   -->
<!-- ============================ -->

<div id="content-area" class="mt-4 min-h-64">
    <!-- Le contenu des onglets sera chargé ici -->
    <div class="text-center py-10 opacity-60">
        Sélectionnez une section…
    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 70vh;">
    <div class="card shadow-sm border-0 text-center p-4" style="max-width: 420px;">
        
        <div class="mb-3">
            <i class="fas fa-lock fa-3x text-danger"></i>
        </div>

        <h4 class="mb-2">Accès refusé</h4>

        <p class="text-muted mb-4">
            {{ message }}
        </p>

        {% if redirect_url %}
            <a href="{% url redirect_url %}" class="btn btn-primary w-100">
                {{ redirect_label }}
            </a>
        {% else %}
            <a href="/" class="btn btn-secondary w-100">
                Retour à l’accueil
            </a>
        {% endif %}
    </div>
</div>
{% endblock %}
